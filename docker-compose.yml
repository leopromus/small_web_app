version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: small_app_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Iwacu@2o19
      MYSQL_DATABASE: small_app
      MYSQL_USER: root
      MYSQL_PASSWORD: Iwacu@2o19
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data: