services:
  # Backend API Service
  - type: web
    name: small-app-backend
    runtime: node
    repo: https://github.com/leopromus/small_web_app.git
    plan: starter  # Changed from "free" to "starter" ($7/month)
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: small-app-mysql
          property: host
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        fromDatabase:
          name: small-app-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: small-app-mysql
          property: password
      - key: DB_NAME
        fromDatabase:
          name: small-app-mysql
          property: database
    buildCommand: |
      cd backend && npm install
    startCommand: |
      cd backend && node server.js
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: small-app-frontend
    runtime: static
    repo: https://github.com/leopromus/small_web_app.git
    plan: free  # Static sites can still use free plan
    branch: main
    buildCommand: |
      cd small_app && npm install && npm run build
    staticPublishPath: ./small_app/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://small-app-backend.onrender.com
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

# Managed MySQL Database
databases:
  - name: small-app-mysql
    plan: free  # Database still has free tier (512MB storage)
    databaseName: small_app
    ipAllowList: []