services:
  # Backend API Service
  - type: web
    name: small-app-backend
    runtime: node
    repo: https://github.com/leopromus/small_web_app.git
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: small-app-mysql
          property: host
      - key: DB_USER
        fromDatabase:
          name: small-app-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: small-app-mysql
          property: password
      - key: DB_NAME
        fromDatabase:
          name: small-app-mysql
          property: database
      - key: DB_PORT
        value: 3306
      - key: PORT
        value: 8080
    buildCommand: |
      cd backend && npm install
    startCommand: |
      cd backend && node server.js
    healthCheckPath: /health

  # Frontend Static Site
  - type: web
    name: small-app-frontend
    runtime: static
    repo: https://github.com/leopromus/small_web_app.git
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://small-app-backend.onrender.com
    buildCommand: |
      cd small_app && npm install && npm run build
    staticPublishPath: ./small_app/build

# Managed MySQL Database on Render
databases:
  - name: small-app-mysql
    plan: free
    databaseName: small_app
    # REMOVED: user and password - Render auto-generates these
    ipAllowList: []