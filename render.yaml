services:
  # Backend API Service
  - type: web
    name: small-app-backend
    runtime: node
    repo: https://github.com/leopromus/small_web_app.git
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: small-app-mysql
          property: host
      - key: DB_USER
        value: root                    # Your MySQL username
      - key: DB_PASSWORD
        value: Iwacu@2o19              # Your MySQL password
      - key: DB_NAME
        fromDatabase:
          name: small-app-mysql
          property: database
      - key: DB_PORT
        value: 3306
      - key: PORT
        value: 8080
    buildCommand: |
      cd backend && npm install
    startCommand: |
      cd backend && node server.js
    healthCheckPath: /health
    domains:
      - api.yourdomain.com

  # Frontend Static Site
  - type: web
    name: small-app-frontend
    runtime: static
    repo: https://github.com/leopromus/small_web_app.git
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://api.yourdomain.com
    buildCommand: |
      cd small_app && npm install && npm run build
    staticPublishPath: ./small_app/build
    domains:
      - yourdomain.com

# Managed MySQL Database on Render
databases:
  - name: small-app-mysql
    plan: free
    databaseName: small_app
    user: root                        # Your MySQL username
    password: Iwacu@2o19              # Your MySQL password
    ipAllowList: []                   # Allow all connections (secured by password)